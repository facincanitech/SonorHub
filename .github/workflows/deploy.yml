name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js from secrets
        run: |
          cat > config.js << EOF
          window.INFOHUB_CONFIG = {
            OPENWEATHER_API_KEY: '${{ secrets.OPENWEATHER_API_KEY }}',
            RAWG_API_KEY: '${{ secrets.RAWG_API_KEY }}',
            APIFOOTBALL_API_KEY: '${{ secrets.APIFOOTBALL_API_KEY }}',
            SUPABASE_URL: '${{ secrets.SUPABASE_URL }}',
            SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}',
            MERCADOPAGO_SUBSCRIBE_LINK: '${{ secrets.MERCADOPAGO_SUBSCRIBE_LINK }}',
          };
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
